<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AntroMed — Avaliação Antropométrica</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f8fafc;color:#1e293b;-webkit-font-smoothing:antialiased}
  #app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  input,textarea,button{font-family:inherit}
  input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  input[type=number]{-moz-appearance:textfield}
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
  .inp{width:100%;border:1px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:15px;outline:none;color:#1e293b;background:#fff}
  .inp:focus{border-color:#0d9488;box-shadow:0 0 0 3px rgba(13,148,136,.1)}
  .lbl{display:block;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
  .card{background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:16px}
  .sec{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
  .btnP{background:#0d9488;color:#fff;border:none;border-radius:12px;padding:13px 20px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;width:100%}
  .btnP:disabled{opacity:.4;cursor:not-allowed}
  .btnG{background:#f1f5f9;color:#475569;border:none;border-radius:12px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;width:100%}
  .btnO{background:#fff;border-radius:12px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;width:100%}
  .tab{padding:13px 14px;border:none;border-bottom:3px solid transparent;background:none;color:#64748b;font-weight:500;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0}
  .tab.on{border-bottom-color:#0d9488;color:#0d9488;font-weight:700}
  .spin{width:48px;height:48px;border:3px solid #f0fdfa;border-top:3px solid #0d9488;border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,-10px)}to{opacity:1;transform:translate(-50%,0)}}
  table{border-collapse:collapse;width:100%}
</style>
</head>
<body>
<div id="app">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;color:#94a3b8">
    <div class="spin"></div><p style="font-size:14px">Carregando...</p>
  </div>
</div>

var uid=function(){return Math.random().toString(36).substr(2,9);};
var toN=function(v){return(v===""||v==null)?null:parseFloat(v);};
var fmt1=function(v){return v!=null?+v.toFixed(1):null;};
var esc=function(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});};
var calcBMI=function(w,h){return(!w||!h)?null:fmt1(w/Math.pow(h/100,2));};
var bmiInfo=function(bmi){
  if(!bmi)return{label:"–",color:"#94a3b8"};
  if(bmi<18.5)return{label:"Abaixo do peso",color:"#0ea5e9"};
  if(bmi<25)return{label:"Peso normal",color:"#22c55e"};
  if(bmi<30)return{label:"Sobrepeso",color:"#eab308"};
  if(bmi<35)return{label:"Obesidade I",color:"#f97316"};
  if(bmi<40)return{label:"Obesidade II",color:"#ef4444"};
  return{label:"Obesidade III",color:"#991b1b"};
};
var calcAge=function(bd){
  if(!bd)return null;
  var t=new Date(),b=new Date(bd);
  var a=t.getFullYear()-b.getFullYear();
  if(t.getMonth()<b.getMonth()||(t.getMonth()===b.getMonth()&&t.getDate()<b.getDate()))a--;
  return a;
};
var calcBF=function(folds,age,sex){
  var keys=["peitoral","axilarMedia","triceps","coxa","suprailiaca","abdominal","subescapular"];
  var sum=keys.reduce(function(a,k){return a+(parseFloat(folds[k])||0);},0);
  if(!sum||!age)return null;
  var dc=sex==="M"
    ?1.112-(0.00043499*sum+0.00000055*sum*sum)-(0.0002882*age)
    :1.0970-(0.00046971*sum+0.00000056*sum*sum)-(0.00012828*age);
  return fmt1((4.95/dc-4.50)*100);
};
var bfClass=function(bf,sex){
  if(bf==null)return{label:"–",color:"#94a3b8"};
  if(sex==="M"){
    if(bf<6)return{label:"Abaixo do essencial",color:"#ef4444"};
    if(bf<14)return{label:"Atleta",color:"#22c55e"};
    if(bf<18)return{label:"Boa forma",color:"#84cc16"};
    if(bf<25)return{label:"Aceitável",color:"#eab308"};
    return{label:"Obesidade",color:"#ef4444"};
  }else{
    if(bf<14)return{label:"Abaixo do essencial",color:"#ef4444"};
    if(bf<21)return{label:"Atleta",color:"#22c55e"};
    if(bf<25)return{label:"Boa forma",color:"#84cc16"};
    if(bf<32)return{label:"Aceitável",color:"#eab308"};
    return{label:"Obesidade",color:"#ef4444"};
  }
};
var sumFolds=function(f){return Object.keys(f).reduce(function(a,k){return a+(parseFloat(f[k])||0);},0);};
var fmtDate=function(d){if(!d)return"–";var p=d.split("-");return p[2]+"/"+p[1]+"/"+p[0];};
var dif=function(a,b){return a!=null&&b!=null?fmt1(a-b):null;};
var dlFile=function(content,filename,mime){
  var blob=new Blob([content],{type:mime});
  var u=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=u;a.download=filename;document.body.appendChild(a);a.click();
  document.body.removeChild(a);setTimeout(function(){URL.revokeObjectURL(u);},2000);
};

var createSupa=function(cfg){
  var base=cfg.url.replace(/\/$/,"");
  var h=function(tok){return{"apikey":cfg.key,"Authorization":"Bearer "+(tok||cfg.key),"Content-Type":"application/json"};};
  var withAuth=function(fn,_retried){
    return Session.ensureValid().then(function(tok){
      return fn(h(tok)).catch(function(e){
        if(!_retried&&/^401/.test(e.message)&&Session.data){Session.data.expires_at=0;return withAuth(fn,true);}
        throw e;
      });
    }).catch(function(e){if(e.message==="not_authenticated")Session.clear();throw e;});
  };
  return{
    loadAll:function(){
      return withAuth(function(headers){
        return fetch(base+"/rest/v1/patients?select=data&order=name",{headers:headers}).then(function(r){
          if(!r.ok)return r.text().then(function(t){throw new Error(r.status+" "+t);});
          return r.json();
        }).then(function(rows){return rows.map(function(x){return x.data;});});
      });
    },
    upsert:function(p){
      return withAuth(function(headers){
        return fetch(base+"/rest/v1/patients",{method:"POST",headers:Object.assign(headers,{"Prefer":"resolution=merge-duplicates,return=minimal"}),body:JSON.stringify({id:p.id,name:p.name,data:p,updated_at:new Date().toISOString()})}).then(function(r){
          if(!r.ok)return r.text().then(function(t){throw new Error(r.status+" "+t);});
        });
      });
    },
    remove:function(id){
      return withAuth(function(headers){
        return fetch(base+"/rest/v1/patients?id=eq."+encodeURIComponent(id),{method:"DELETE",headers:headers}).then(function(r){
          if(!r.ok)return r.text().then(function(t){throw new Error(r.status+" "+t);});
        });
      });
    },
    test:function(){
      return fetch(base+"/rest/v1/patients?select=id&limit=1",{headers:h()}).then(function(r){
        if(!r.ok)return r.text().then(function(t){throw new Error(r.status+" "+t);});
        return true;
      });
    }
  };
};

// AUTH (login por e-mail/senha, via Supabase Auth REST)
//══════════════════════════════════════════════════════════════════════════
var authStore={
  load:function(){try{var r=localStorage.getItem("antro-auth");return r?JSON.parse(r):null;}catch(e){return null;}},
  save:function(s){try{localStorage.setItem("antro-auth",JSON.stringify(s));}catch(e){}},
  clear:function(){try{localStorage.removeItem("antro-auth");}catch(e){}}
};
var createAuth=function(cfg){
  var base=cfg.url.replace(/\/$/,"");
  var hh=function(){return{"apikey":cfg.key,"Content-Type":"application/json"};};
  var parse=function(r){return r.json().catch(function(){return{};}).then(function(j){if(!r.ok)throw new Error(j.error_description||j.msg||j.error||"Falha na autenticação");return j;});};
  return{
    signIn:function(email,password){
      return fetch(base+"/auth/v1/token?grant_type=password",{method:"POST",headers:hh(),body:JSON.stringify({email:email,password:password})}).then(parse);
    },
    refresh:function(refreshToken){
      return fetch(base+"/auth/v1/token?grant_type=refresh_token",{method:"POST",headers:hh(),body:JSON.stringify({refresh_token:refreshToken})}).then(parse);
    },
    signOut:function(accessToken){
      return fetch(base+"/auth/v1/logout",{method:"POST",headers:Object.assign(hh(),{"Authorization":"Bearer "+accessToken})}).catch(function(){});
    },
    recover:function(email){
      return fetch(base+"/auth/v1/recover",{method:"POST",headers:hh(),body:JSON.stringify({email:email})}).then(function(r){
        if(!r.ok)return r.text().then(function(t){throw new Error(t);});
      });
    }
  };
};
// Session: mantém o login da pessoa atual e renova o token quando necessário
var Session={
  data:null,auth:null,
  load:function(){this.data=authStore.load();},
  set:function(tok){
    this.data={access_token:tok.access_token,refresh_token:tok.refresh_token,expires_at:Date.now()+((tok.expires_in||3600)*1000),user:tok.user};
    authStore.save(this.data);
  },
  clear:function(){this.data=null;authStore.clear();},
  isValid:function(){return!!(this.data&&this.data.expires_at>Date.now()+15000);},
  email:function(){return this.data&&this.data.user?this.data.user.email:null;},
  ensureValid:function(){
    if(!this.data)return Promise.reject(new Error("not_authenticated"));
    if(this.isValid())return Promise.resolve(this.data.access_token);
    if(!this.auth)return Promise.reject(new Error("not_authenticated"));
    var self=this;
    return this.auth.refresh(this.data.refresh_token).then(function(tok){self.set(tok);return self.data.access_token;})
      .catch(function(){self.clear();throw new Error("not_authenticated");});
  }
};

// SVG CHARTS
//══════════════════════════════════════════════════════════════════════════
var svgChart=function(series,labels,opts){
  opts=opts||{};
  var W=460,H=150,pad={t:12,r:14,b:24,l:36};
  var iw=W-pad.l-pad.r,ih=H-pad.t-pad.b;
  var allVals=[];
  series.forEach(function(s){s.data.forEach(function(v){if(v!=null)allVals.push(v);});});
  if(allVals.length===0)return '<div style="text-align:center;color:#cbd5e1;padding:30px;font-size:13px">Sem dados</div>';
  var min=Math.min.apply(null,allVals),max=Math.max.apply(null,allVals);
  if(min===max){min-=1;max+=1;}
  var range=max-min;min-=range*0.1;max+=range*0.1;
  var n=labels.length;
  var xAt=function(i){return pad.l+(n<=1?iw/2:iw*i/(n-1));};
  var yAt=function(v){return pad.t+ih-(ih*(v-min)/(max-min));};
  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block">';
  // grid
  for(var g=0;g<=3;g++){
    var gy=pad.t+ih*g/3;
    var gv=(max-(max-min)*g/3);
    svg+='<line x1="'+pad.l+'" y1="'+gy+'" x2="'+(W-pad.r)+'" y2="'+gy+'" stroke="#f1f5f9" stroke-width="1"/>';
    svg+='<text x="'+(pad.l-6)+'" y="'+(gy+3)+'" text-anchor="end" font-size="9" fill="#94a3b8">'+gv.toFixed(gv<10?1:0)+'</text>';
  }
  // x labels
  labels.forEach(function(lab,i){
    if(n>4&&i%Math.ceil(n/4)!==0&&i!==n-1)return;
    svg+='<text x="'+xAt(i)+'" y="'+(H-8)+'" text-anchor="middle" font-size="9" fill="#94a3b8">'+esc(lab)+'</text>';
  });
  // series
  series.forEach(function(s){
    var pts=[],area="";
    s.data.forEach(function(v,i){if(v!=null)pts.push([xAt(i),yAt(v)]);});
    if(pts.length===0)return;
    var d=pts.map(function(p,i){return(i===0?"M":"L")+p[0]+" "+p[1];}).join(" ");
    if(opts.area){
      var ad="M"+pts[0][0]+" "+(pad.t+ih)+" "+pts.map(function(p){return"L"+p[0]+" "+p[1];}).join(" ")+" L"+pts[pts.length-1][0]+" "+(pad.t+ih)+" Z";
      svg+='<path d="'+ad+'" fill="'+s.color+'" opacity="0.12"/>';
    }
    svg+='<path d="'+d+'" fill="none" stroke="'+s.color+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';
    pts.forEach(function(p){svg+='<circle cx="'+p[0]+'" cy="'+p[1]+'" r="2.5" fill="'+s.color+'"/>';});
  });
  svg+='</svg>';
  // legend
  if(series.length>1||opts.legend){
    svg+='<div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:6px">';
    series.forEach(function(s){svg+='<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#64748b"><span style="width:10px;height:10px;border-radius:2px;background:'+s.color+'"></span>'+esc(s.name)+'</span>';});
    svg+='</div>';
  }
  return svg;
};

var EVOCARD_W=1600,EVOCARD_H=820;
var buildEvoCardSVG=function(pat){
  var cs=pat.consultations,first=cs[0],last=cs[cs.length-1];
  var W=EVOCARD_W,H=EVOCARD_H;
  var dW=dif(last.weight,first.weight),dBF=dif(last.bodyFat,first.bodyFat),dLean=dif(last.leanMass,first.leanMass);
  var daysBetween=Math.round((new Date(last.date)-new Date(first.date))/86400000);
  var age=calcAge(pat.birthDate);
  var s='<svg xmlns="http://www.w3.org/2000/svg" width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'">';
  s+='<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0e14"/><stop offset="100%" stop-color="#111927"/></linearGradient>'
    +'<radialGradient id="glow" cx="15%" cy="0%" r="75%"><stop offset="0%" stop-color="#0f766e" stop-opacity="0.35"/><stop offset="100%" stop-color="#0f766e" stop-opacity="0"/></radialGradient></defs>';
  s+='<rect width="'+W+'" height="'+H+'" fill="url(#bg)"/><rect width="'+W+'" height="'+H+'" fill="url(#glow)"/>';
  s+='<rect x="0" y="0" width="'+W+'" height="8" fill="#0d9488"/>';
  s+='<image href="'+LOGO+'" x="60" y="46" height="62" opacity="0.95"/>';
  s+='<text x="146" y="76" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="700" letter-spacing="4" fill="#5eead4">INSTITUTO ROAR · PERFORMANCE</text>';
  s+='<text x="146" y="106" font-family="Segoe UI,Arial,sans-serif" font-size="24" font-weight="800" fill="#94a3b8">Jornada de Transformação</text>';
  s+='<text x="60" y="192" font-family="Segoe UI,Arial,sans-serif" font-size="46" font-weight="800" fill="#ffffff">'+esc(pat.name)+'</text>';
  s+='<text x="60" y="228" font-family="Segoe UI,Arial,sans-serif" font-size="18" fill="#5eead4">'+(pat.sex==="M"?"Masculino":"Feminino")+(age?" · "+age+" anos":"")+' · '+fmtDate(first.date)+' → '+fmtDate(last.date)+' ('+daysBetween+' dias)</text>';
  s+='<line x1="60" y1="266" x2="'+(W-60)+'" y2="266" stroke="#1e293b" stroke-width="2"/>';
  var stats=[
    {label:"PESO",unit:"kg",before:first.weight,after:last.weight,delta:dW,good:"down"},
    {label:"% GORDURA",unit:"%",before:first.bodyFat,after:last.bodyFat,delta:dBF,good:"down"},
    {label:"MASSA MAGRA",unit:"kg",before:first.leanMass,after:last.leanMass,delta:dLean,good:"up"}
  ];
  var cardY=306,cardH=280,gap=40,cardX0=60,cardW=(W-2*cardX0-2*gap)/3;
  stats.forEach(function(st,i){
    var cx=cardX0+i*(cardW+gap);
    var goodDir=st.delta==null?null:(st.good==="down"?st.delta<0:st.delta>0);
    var dcolor=st.delta==null?"#64748b":(goodDir?"#4ade80":"#f87171");
    s+='<rect x="'+cx+'" y="'+cardY+'" width="'+cardW+'" height="'+cardH+'" rx="20" fill="#111927" stroke="#1e293b" stroke-width="2"/>';
    s+='<text x="'+(cx+28)+'" y="'+(cardY+44)+'" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" letter-spacing="2" fill="#64748b">'+st.label+'</text>';
    s+='<text x="'+(cx+28)+'" y="'+(cardY+116)+'" font-family="Segoe UI,Arial,sans-serif" font-size="50" font-weight="800" fill="#ffffff">'+(st.after!=null?st.after:"–")+'<tspan font-size="19" fill="#64748b"> '+st.unit+'</tspan></text>';
    s+='<text x="'+(cx+28)+'" y="'+(cardY+152)+'" font-family="Segoe UI,Arial,sans-serif" font-size="16" fill="#475569">antes: '+(st.before!=null?st.before+" "+st.unit:"–")+'</text>';
    if(st.delta!=null){
      s+='<rect x="'+(cx+28)+'" y="'+(cardY+176)+'" width="'+(cardW-56)+'" height="46" rx="10" fill="'+dcolor+'" opacity="0.16"/>';
      s+='<text x="'+(cx+cardW/2)+'" y="'+(cardY+206)+'" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="20" font-weight="800" fill="'+dcolor+'">'+(goodDir?"▼":"▲")+' '+Math.abs(st.delta)+' '+st.unit+'</text>';
    }
  });
  var afterCards=cardY+cardH;
  if(last.weight&&last.leanMass!=null&&last.fatMass!=null){
    var lp=last.leanMass/last.weight*100,gp=last.fatMass/last.weight*100;
    var barY=afterCards+50,barH=30,barX=60,barW=W-120,leanW=barW*lp/100;
    s+='<text x="'+barX+'" y="'+(barY-16)+'" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" letter-spacing="2" fill="#64748b">COMPOSIÇÃO CORPORAL ATUAL</text>';
    s+='<rect x="'+barX+'" y="'+barY+'" width="'+barW+'" height="'+barH+'" rx="15" fill="#1e293b"/>';
    s+='<rect x="'+barX+'" y="'+barY+'" width="'+Math.max(leanW,15)+'" height="'+barH+'" rx="15" fill="#4ade80"/>';
    s+='<rect x="'+(barX+leanW)+'" y="'+barY+'" width="'+Math.max(barW-leanW,15)+'" height="'+barH+'" rx="15" fill="#fb923c"/>';
    s+='<text x="'+barX+'" y="'+(barY+barH+26)+'" font-family="Segoe UI,Arial,sans-serif" font-size="15" fill="#4ade80" font-weight="700">Massa Magra '+lp.toFixed(0)+'%</text>';
    s+='<text x="'+(barX+barW)+'" y="'+(barY+barH+26)+'" text-anchor="end" font-family="Segoe UI,Arial,sans-serif" font-size="15" fill="#fb923c" font-weight="700">Massa Gorda '+gp.toFixed(0)+'%</text>';
    afterCards=barY+barH+50;
  }else{afterCards=afterCards+40;}
  s+='<line x1="60" y1="'+afterCards+'" x2="'+(W-60)+'" y2="'+afterCards+'" stroke="#1e293b" stroke-width="2"/>';
  s+='<text x="60" y="'+(afterCards+44)+'" font-family="Segoe UI,Arial,sans-serif" font-size="16" fill="#64748b">'+cs.length+' avaliações realizadas · Acompanhamento Instituto ROAR</text>';
  s+='<text x="'+(W-60)+'" y="'+(afterCards+44)+'" text-anchor="end" font-family="Segoe UI,Arial,sans-serif" font-size="16" fill="#475569">Gerado em '+new Date().toLocaleDateString("pt-BR")+'</text>';
  s+='</svg>';
  return s;
};
var downloadEvoCard=function(pat){
  var svgStr=buildEvoCardSVG(pat);
  var url=URL.createObjectURL(new Blob([svgStr],{type:"image/svg+xml;charset=utf-8"}));
  var img=new Image();
  img.onload=function(){
    var canvas=document.createElement("canvas");
    canvas.width=EVOCARD_W;canvas.height=EVOCARD_H;
    canvas.getContext("2d").drawImage(img,0,0);
    URL.revokeObjectURL(url);
    canvas.toBlob(function(blob){
      if(!blob){showToast("Erro ao gerar imagem",false);return;}
      var safe=pat.name.replace(/[^a-zA-Z0-9À-ÿ\s]/g,"").replace(/\s+/g,"_");
      var u2=URL.createObjectURL(blob);
      var a=document.createElement("a");
      a.href=u2;a.download="AntroMed_Evolucao_"+safe+"_"+new Date().toISOString().split("T")[0]+".png";
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(function(){URL.revokeObjectURL(u2);},2000);
      showToast("Card de evolução baixado! Pronto para WhatsApp/TV.");
    },"image/png");
  };
  img.onerror=function(){URL.revokeObjectURL(url);showToast("Erro ao gerar imagem",false);};
  img.src=url;
};

  });

  // table
  h+='<div style="overflow-x:auto;border-radius:14px;border:1px solid #e2e8f0"><table style="font-size:12px;background:#fff"><thead><tr style="border-bottom:2px solid #e2e8f0;background:#f8fafc">';

var vEvolucao=function(){
  var pat=getPat(),cs=pat.consultations;
  if(cs.length<2)return '<div style="text-align:center;padding:60px 20px;color:#94a3b8"><div style="font-size:15px;font-weight:600;margin-bottom:4px">Mínimo 2 avaliações</div><div style="font-size:13px">Registre mais consultas para ver a evolução cinematográfica</div></div>';
  var first=cs[0],last=cs[cs.length-1];
  var labels=cs.map(function(c){return fmtDate(c.date);});
  var col=function(get){return cs.map(get);};
  var age=calcAge(pat.birthDate);

  // deltas
  var dW=dif(last.weight,first.weight);
  var dBF=dif(last.bodyFat,first.bodyFat);
  var dLean=dif(last.leanMass,first.leanMass);
  var dWaist=dif(last.circs?last.circs.cintura:null,first.circs?first.circs.cintura:null);

    // x labels
    labels.forEach(function(lab,i){

      pts.forEach(function(p,i){

// Update only the results panel while typing in consult (no full re-render)
var liveCalc=function(){
  // Lightweight: re-render whole consult is fine but avoid losing focus.
  // We update the results card DOM directly.
  var pat=getPat(),f=S.form;
  var age=calcAge(pat?pat.birthDate:null);
  var bmi=calcBMI(toN(f.weight),toN(f.height));
  var bf=calcBF(f.folds,age,pat?pat.sex:"M");
  var w=toN(f.weight)||0;
  var fatM=bf&&w?fmt1(w*bf/100):null,lenM=bf&&w?fmt1(w*(1-bf/100)):null;
  var sf=fmt1(sumFolds(f.folds));
  var bi=bmiInfo(bmi),bc=bfClass(bf,pat?pat.sex:"M");
  var panel=document.getElementById("resPanel");
  if(!panel)return;
  var res=[["IMC",bmi||"–",bi.label,bi.color],["% Gordura",bf!=null?bf+"%":"–",bc.label,bc.color],["Massa Magra",lenM!=null?lenM+" kg":"–",null,null],["Massa Gorda",fatM!=null?fatM+" kg":"–",null,null]];
  var inner='<div style="font-size:11px;font-weight:700;color:#99f6e4;text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px">📊 Resultados em Tempo Real</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">';
  res.forEach(function(r){inner+='<div style="background:rgba(255,255,255,.12);border-radius:10px;padding:12px"><div style="font-size:11px;color:#99f6e4;margin-bottom:4px">'+r[0]+'</div><div style="font-size:20px;font-weight:800;color:#fff">'+r[1]+'</div>'+(r[2]?'<div style="font-size:10px;margin-top:2px;color:'+(r[3]||"#99f6e4")+'">'+r[2]+'</div>':"")+'</div>';});
  inner+='</div><div style="margin-top:10px;background:rgba(255,255,255,.12);border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:#99f6e4">Σ Dobras Cutâneas (mm)</span><span style="font-size:18px;font-weight:800;color:#fff">'+(sf>0?sf:"–")+'</span></div><div style="margin-top:8px;font-size:10px;color:rgba(255,255,255,.5);text-align:center">Jackson-Pollock 7 dobras · Siri (1961)</div>';
  panel.innerHTML=inner;
};

var handleImport=function(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      var incoming=data.patients||(Array.isArray(data)?data:null);
      if(!incoming){showToast("Arquivo inválido",false);return;}
      var added=0;
      var chain=Promise.resolve();
      incoming.forEach(function(p){
        var exists=null;
        for(var i=0;i<S.patients.length;i++)if(S.patients[i].id===p.id)exists=S.patients[i];
        if(exists){
          var ids={};exists.consultations.forEach(function(c){ids[c.id]=1;});
          var newCs=p.consultations.filter(function(c){return!ids[c.id];});
          var merged=Object.assign({},exists,{consultations:exists.consultations.concat(newCs).sort(function(a,b){return new Date(a.date)-new Date(b.date);})});
          S.patients=S.patients.map(function(x){return x.id===p.id?merged:x;});
          added+=newCs.length;
          chain=chain.then(function(){return syncPat(merged);});
        }else{
          S.patients.push(p);added++;
          chain=chain.then(function(){return syncPat(p);});
        }
      });
      chain.then(function(){render();showToast("Importado! "+added+" item(ns)");});
    }catch(err){showToast("Erro ao ler arquivo",false);}
  };
  reader.readAsText(file);e.target.value="";
};

      S.auth=createAuth({url:url,key:key});Session.auth=S.auth;
      S.cfgLoading=false;showToast("Conectado!");
      S.screen="login";render();
    }).catch(function(err){S.cfgLoading=false;render();showToast("Erro: "+err.message,false);});
  }
  else if(act==="skipSupa"){S.supa=null;S.screen="list";render();showToast("Modo offline ativado");}
  else if(act==="doLogin"){
    if(!S.loginForm.email||!S.loginForm.password)return;
    S.loginLoading=true;S.loginError=null;render();
    S.auth.signIn(S.loginForm.email.trim(),S.loginForm.password).then(function(tok){
      Session.set(tok);S.loginLoading=false;S.loginForm={email:"",password:""};
      S.screen="list";render();loadPats(S.supa);
    }).catch(function(err){S.loginLoading=false;S.loginError=err.message;render();});
  }
  else if(act==="forgotPass"){
    if(!S.loginForm.email){showToast("Digite seu e-mail acima primeiro",false);return;}
    S.auth.recover(S.loginForm.email.trim()).then(function(){
      showToast("E-mail de redefinição enviado!");
    }).catch(function(err){showToast("Erro: "+err.message,false);});
  }
  else if(act==="logout"){
    if(Session.data)S.auth.signOut(Session.data.access_token);
    Session.clear();S.patients=[];S.selId=null;S.screen="login";render();
  }
  else if(act==="openGuide"){S.guideReturnScreen=S.screen;S.screen="guide";render();}
  else if(act==="toggleGuide"){var gid=el.getAttribute("data-id");S.guideOpen=S.guideOpen===gid?null:gid;render();}
  else if(act==="back"){
    if(S.screen==="guide"){S.screen=S.guideReturnScreen||"list";S.guideReturnScreen=null;}
    else if(S.screen==="consult"){S.screen="dash";S.editId=null;S.form=emptyForm();}
    else if(S.screen==="editPat"){S.screen="dash";S.tab="export";}
    else S.screen="list";
    render();
  }
  else if(act==="refresh"){if(S.supa)loadPats(S.supa);}
  else if(act==="newConsult"){S.form=emptyForm();S.editId=null;S.screen="consult";render();}
  else if(act==="newPat"){S.pForm={name:"",birthDate:"",sex:"M"};S.screen="newPat";render();}
  else if(act==="reconfig"){S.screen="setup";render();}
  else if(act==="npSex"){S.pForm.sex=el.getAttribute("data-sex");render();}
  else if(act==="epSex"){S.epData.sex=el.getAttribute("data-sex");render();}
  else if(act==="addPat"){
    if(!S.pForm.name.trim())return;
    var np={id:uid(),name:S.pForm.name.trim(),birthDate:S.pForm.birthDate,sex:S.pForm.sex,consultations:[]};
    S.patients.push(np);S.selId=np.id;S.screen="dash";S.tab="resumo";
    render();syncPat(np).then(function(){showToast("Paciente cadastrado!");});
  }
  else if(act==="openPat"){S.selId=el.getAttribute("data-id");S.screen="dash";S.tab="resumo";render();}
  else if(act==="setTab"){S.tab=el.getAttribute("data-tab");render();}
  else if(act==="startEditPat"){S.epData={name:pat.name,birthDate:pat.birthDate||"",sex:pat.sex};S.screen="editPat";render();}
  else if(act==="savePat"){
    if(!S.epData.name.trim())return;
    var upd=Object.assign({},pat,{name:S.epData.name.trim(),birthDate:S.epData.birthDate,sex:S.epData.sex});
    S.patients=S.patients.map(function(p){return p.id===S.selId?upd:p;});
    S.screen="dash";S.tab="export";render();syncPat(upd).then(function(){showToast("Dados atualizados!");});
  }
  else if(act==="cancelEdit"){S.screen="dash";S.tab="export";render();}
  else if(act==="cancelConsult"){S.screen="dash";S.editId=null;S.form=emptyForm();render();}
  else if(act==="saveConsult"){
    var f=S.form,age=calcAge(pat?pat.birthDate:null);
    var bmi=calcBMI(toN(f.weight),toN(f.height));
    var bf=calcBF(f.folds,age,pat?pat.sex:"M");
    var w=toN(f.weight)||0,sf=fmt1(sumFolds(f.folds));
    var entry={id:S.editId||uid(),date:f.date,weight:toN(f.weight),height:toN(f.height),bmi:bmi,circs:{},folds:{},bodyFat:bf,fatMass:bf&&w?fmt1(w*bf/100):null,leanMass:bf&&w?fmt1(w*(1-bf/100)):null,sfSum:sf,notes:f.notes};
    CIRCS.forEach(function(c){entry.circs[c.key]=toN(f.circs[c.key]);});
    FOLDS.forEach(function(x){entry.folds[x.key]=toN(f.folds[x.key]);});
    var newCs;
    if(S.editId)newCs=pat.consultations.map(function(c){return c.id===S.editId?entry:c;});
    else newCs=pat.consultations.concat([entry]).sort(function(a,b){return new Date(a.date)-new Date(b.date);});
    var upd=Object.assign({},pat,{consultations:newCs});
    S.patients=S.patients.map(function(p){return p.id===S.selId?upd:p;});
    S.editId=null;S.form=emptyForm();S.screen="dash";S.tab="historico";
    render();syncPat(upd).then(function(){showToast("Avaliação salva!");});
  }
  else if(act==="editConsult"){
    var cid=el.getAttribute("data-id");
    var c=null;pat.consultations.forEach(function(x){if(x.id===cid)c=x;});
    if(!c)return;
    var nf={date:c.date,weight:c.weight!=null?String(c.weight):"",height:c.height!=null?String(c.height):"",notes:c.notes||"",circs:{},folds:{}};
    CIRCS.forEach(function(x){nf.circs[x.key]=c.circs&&c.circs[x.key]!=null?String(c.circs[x.key]):"";});
    FOLDS.forEach(function(x){nf.folds[x.key]=c.folds&&c.folds[x.key]!=null?String(c.folds[x.key]):"";});
    S.form=nf;S.editId=cid;S.screen="consult";render();
  }
  else if(act==="delConsult"){
    var cid2=el.getAttribute("data-id");
    if(!confirm("Excluir esta consulta?"))return;
    var upd2=Object.assign({},pat,{consultations:pat.consultations.filter(function(c){return c.id!==cid2;})});
    S.patients=S.patients.map(function(p){return p.id===S.selId?upd2:p;});
    render();syncPat(upd2).then(function(){showToast("Consulta removida");});
  }
  else if(act==="delPat"){
    if(!confirm("Excluir o paciente "+pat.name+" e todo o histórico?"))return;
    var pid=pat.id;
    S.patients=S.patients.filter(function(p){return p.id!==pid;});
    S.selId=null;S.screen="list";render();
    if(S.supa)S.supa.remove(pid).then(function(){showToast("Paciente excluído");}).catch(function(err){if(!handleAuthErr(err))showToast("Erro: "+err.message,false);});
    else showToast("Paciente excluído");
  }
  else if(act==="genReport"){genReport(pat);showToast("Relatório gerado!");}
  else if(act==="downloadEvoCard"){downloadEvoCard(pat);}
  else if(act==="exportPat"){
    var safe=pat.name.replace(/[^a-zA-Z0-9À-ÿ\s]/g,"").replace(/\s+/g,"_");
    dlFile(JSON.stringify({version:1,patients:[pat]},null,2),"AntroMed_"+safe+".json","application/json");
    showToast("Exportado!");
  }
  else if(act==="exportAll"){
    dlFile(JSON.stringify({version:1,exportDate:new Date().toISOString(),patients:S.patients},null,2),"AntroMed_backup_"+new Date().toISOString().split("T")[0]+".json","application/json");
    showToast("Backup exportado!");
  }
  else if(act==="importClick"){var f=document.getElementById("importFile");if(f)f.click();}
});

//══════════════════════════════════════════════════════════════════════════
// INIT
//══════════════════════════════════════════════════════════════════════════
(function init(){
  var saved=cfgStore.load();
  if(saved){
    S.cfg=saved;S.supa=createSupa(saved);
    S.auth=createAuth(saved);Session.auth=S.auth;Session.load();
    if(Session.data){
      Session.ensureValid().then(function(){S.screen="list";render();loadPats(S.supa);})
      .catch(function(){S.screen="login";render();});
    }else{
      S.screen="login";render();
    }
  }else{
    S.screen="setup";render();
  }
})();
</script>
</body>
</html>
